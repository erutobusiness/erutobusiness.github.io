<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>特定商取引法に基づく表記 - eruto</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0d0d0d;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 2rem 0;
    }

    .container {
      max-width: 600px;
      width: 100%;
      padding: 2rem;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: #fff;
      margin-bottom: 2rem;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 2rem;
    }

    th, td {
      text-align: left;
      padding: 0.75rem 1rem;
      border-bottom: 1px solid #2a2a2a;
      vertical-align: top;
    }

    th {
      width: 35%;
      color: #a78bfa;
      font-weight: 600;
      font-size: 0.85rem;
    }

    td {
      color: #e0e0e0;
      font-size: 0.9rem;
      line-height: 1.6;
    }

    .back {
      color: #888;
      text-decoration: none;
      font-size: 0.9rem;
      transition: color 0.2s;
    }

    .back:hover {
      color: #a78bfa;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>特定商取引法に基づく表記</h1>
    <table>
      <tr>
        <th>事業者名</th>
        <td>Kondo Eruto</td>
      </tr>
      <tr>
        <th>所在地</th>
        <td>請求があった場合に遅滞なく開示いたします</td>
      </tr>
      <tr>
        <th>連絡先</th>
        <td>erutobusiness@gmail.com</td>
      </tr>
      <tr>
        <th>販売価格</th>
        <td>各支援ページに記載の金額（任意のチップ・寄付）</td>
      </tr>
      <tr>
        <th>支払方法</th>
        <td>クレジットカード（Stripe経由）</td>
      </tr>
      <tr>
        <th>支払時期</th>
        <td>支援時に即時決済</td>
      </tr>
      <tr>
        <th>商品の引渡時期</th>
        <td>該当なし（寄付・チップのため）</td>
      </tr>
      <tr>
        <th>返品・キャンセル</th>
        <td>寄付・チップの性質上、原則として返金には応じかねます。誤操作等の場合はメールにてご連絡ください</td>
      </tr>
    </table>
    <a class="back" href="/">&larr; Back</a>
  </div>
</body>
</html>
